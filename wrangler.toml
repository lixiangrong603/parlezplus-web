# ParlezPlus Cloudflare Pages + D1 + R2 配置
# 文档: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "parlezplus"
compatibility_date = "2024-02-09"
pages_build_output_dir = "dist"

# ============================================
# D1 数据库绑定
# 创建命令: npx wrangler d1 create parlezplus_db
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "parlezplus_db"
database_id = "c7b9d675-cfb5-4d16-b836-d0dc5c7ba24b"

# ============================================
# R2 存储桶绑定
# 需要在 Dashboard 启用 R2: https://dash.cloudflare.com/?to=/:account/r2
# 创建命令: npx wrangler r2 bucket create parlezplus-media
# ============================================
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "parlezplus-media"

# ============================================
# KV 命名空间 (可选，用于缓存)
# ============================================
# [[kv_namespaces]]
# binding = "KV"
# id = "" # TODO: 如需使用缓存，运行 wrangler kv:namespace create 后填入

# ============================================
# 环境变量 (非敏感)
# 敏感变量通过 .dev.vars 文件配置（本地）或 wrangler secret（生产）
# ============================================
[vars]
ENVIRONMENT = "development"

# ============================================
# 本地开发配置
# 运行 `npm run dev:wrangler` 或 `npm run pages:dev` 启动本地开发
# ============================================

# ============================================
# 生产环境配置
# ============================================
[env.production]
# 敏感信息通过 wrangler secret put 命令设置:
# npx wrangler secret put GEMINI_MASTER_KEY
# npx wrangler secret put AZURE_MASTER_KEY
# npx wrangler secret put JWT_SECRET

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "parlezplus_db"
database_id = "c7b9d675-cfb5-4d16-b836-d0dc5c7ba24b"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "parlezplus-media"

# ============================================
# 预览环境配置 (用于测试分支)
# ============================================
[env.preview]
# 可以为预览环境单独配置不同的数据库/存储桶

# ============================================
# 部署说明
# ============================================
# 1. 安装 Wrangler: npm install -g wrangler
# 2. 登录 Cloudflare: npx wrangler login
# 3. 创建 D1 数据库: npx wrangler d1 create parlezplus_db
# 4. 创建 R2 存储桶: npx wrangler r2 bucket create parlezplus-media
# 5. 创建 KV 命名空间: npx wrangler kv:namespace create "KV"
# 6. 填入上述创建后返回的 ID
# 7. 执行数据库 Schema: npx wrangler d1 execute parlezplus_db --file=database/schema.sql
# 8. 部署: npx wrangler pages deploy dist --project-name=parlezplus
