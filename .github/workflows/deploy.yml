name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build
        run: npm run build

      # 使用 wrangler 部署（Cloudflare 偶发 internal error 时自动重试，并输出 debug 日志）
      - name: Deploy to Cloudflare Pages (retry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "Deploy attempt $i/3"
            npx --yes wrangler@4.63.0 pages deploy dist --project-name=fluide --commit-dirty=true && break
            if [ "$i" -lt 3 ]; then
              echo "Deploy failed; retrying in 20s..."
              sleep 20
            else
              echo "Deploy failed after 3 attempts"
              exit 1
            fi
          done

      # 首次部署或 schema 变更时运行数据库迁移
      - name: Run D1 migrations (if schema changed)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: |
          npx --yes wrangler@4.63.0 d1 execute parlezplus_db --remote --file=database/schema.sql
        continue-on-error: true # schema 已存在时不会失败
